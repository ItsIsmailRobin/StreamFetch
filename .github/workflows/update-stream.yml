name: Update Stream URL

on:
  schedule:
    # GitHub Actions does not reliably support 1-minute schedules.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract latest stream URL
        run: node scripts/update-stream.mjs

      - name: Commit changes if Stream.txt changed
        run: |
          if git diff --quiet Stream.txt public/Stream.txt; then
            echo "No stream URL changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Stream.txt public/Stream.txt
          git commit -m "chore: update stream URL"
          git push
