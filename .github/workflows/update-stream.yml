name: Update Stream URL

on:
  push:
    branches:
      - main
    paths-ignore:
      - "Stream.txt"
      - "stream.txt"
      - "public/Stream.txt"
      - "public/stream.txt"
      - "LastCheck.txt"
      - "public/LastCheck.txt"
  schedule:
    # Run every 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stream-url
  cancel-in-progress: false

jobs:
  update-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract latest stream URL
        run: node scripts/update-stream.mjs

      - name: Commit changes if stream or heartbeat changed
        run: |
          if git diff --quiet Stream.txt stream.txt public/Stream.txt public/stream.txt stream.m3u8 public/stream.m3u8 LastCheck.txt public/LastCheck.txt; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Stream.txt stream.txt public/Stream.txt public/stream.txt stream.m3u8 public/stream.m3u8 LastCheck.txt public/LastCheck.txt
          git commit -m "chore: update stream and heartbeat"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
